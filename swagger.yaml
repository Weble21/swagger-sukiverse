---
openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: https://sukiverse.onrender.com
  description: Production server
paths:
  "/api/v1/auth/login":
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AuthRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/ApiResponseLoginResponse"
components:
  schemas:
    AuthRequest:
      type: object
      properties:
        provider:
          type: string
        code:
          type: string
      required:
      - code
      - provider
    ApiResponseLoginResponse:
      type: object
      properties:
        isSuccess:
          type: boolean
        responseDto:
          "$ref": "#/components/schemas/LoginResponse"
        error:
          "$ref": "#/components/schemas/ErrorDto"
      required:
      - isSuccess
    ErrorDto:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        userDetails:
          "$ref": "#/components/schemas/UserDetailsDto"
      required:
      - accessToken
      - refreshToken
      - userDetails
    UserDetailsDto:
      type: object
      properties:
        id:
          type: string
        profileImage:
          type: string
        isOnboardingCompleted:
          type: boolean
      required:
      - id
      - isOnboardingCompleted
